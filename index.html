<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Letter</title>
    
    <link href="https://gs.jurieo.com/gemini/fonts-googleapis/css2?family=Italianno&family=Noto+Serif+SC:wght@300;400&display=swap" rel="stylesheet">

    <style>
        :root {
            --morandi-green: #91a398; /* 核心莫兰迪绿 */
            --soft-white: #f4f4f4;
            --text-color: #555e58;
            /* 定义字体变量 */
            --font-fancy: 'Italianno', cursive; /* 英文花体 */
            --font-main: 'Noto Serif SC', serif;  /* 中文书卷 */
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; 
            /* 全局默认使用更有质感的宋体 */
            font-family: var(--font-main); 
            background: var(--soft-white); 
            color: var(--text-color); 
            -webkit-font-smoothing: antialiased; /* 让字体看起来更清晰 */
        }

        /* 入口遮罩 */
        #entry-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--morandi-green);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; transition: opacity 1.2s ease;
        }

        .play-btn {
            background: none; border: 1px solid rgba(255,255,255,0.6);
            color: white; padding: 10px 40px; border-radius: 2px;
            cursor: pointer; 
            /* 按钮使用优雅的英文花体 */
            font-family: var(--font-fancy);
            font-size: 36px; /* 花体字需要大一点才好看 */
            letter-spacing: 1px;
            transition: all 0.3s;
            line-height: 1;
        }

        .play-btn:hover { background: rgba(255,255,255,0.1); transform: scale(1.05); }

        /* 信件容器 */
        .container {
            max-width: 600px; margin: 0 auto; padding: 60px 25px;
            opacity: 0; transform: translateY(15px); transition: all 2s ease 0.6s;
        }

        .letter-body {
            background: white; padding: 60px 50px; border-radius: 2px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.02);
            line-height: 2.2; /* 增加行距，更像书写的感觉 */
            border-top: 3px solid var(--morandi-green);
        }

        h2 { 
            font-weight: 400; 
            color: var(--morandi-green); 
            margin-bottom: 40px; 
            font-size: 24px;
            letter-spacing: 1px;
        }
        
        p { 
            white-space: pre-wrap; 
            word-wrap: break-word; 
            font-size: 16px; 
            color: #4a554f;
            letter-spacing: 0.5px;
        }

        /* 激活状态 */
        .is-open #entry-overlay { opacity: 0; pointer-events: none; }
        .is-open .container { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>

<div id="entry-overlay">
    <button class="play-btn" onclick="start()">Open</button>
</div>

<div class="container">
    <div class="letter-body">
        <h2>致 李雅雯</h2>
        <p>

    </div>
</div>

<audio id="bgm" loop>
    <source src="bgm.mp3" type="audio/mpeg">
</audio>

<script>
    function start() {
        document.body.classList.add('is-open');
        const audio = document.getElementById('bgm');
        audio.play().catch(err => {
            console.log("音频播放受阻，请确保bgm.mp3已上传至同一目录");
        });
    }
</script>

</body>
</html>
